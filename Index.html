<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE VAULT</title>
    
    <link rel="apple-touch-icon" href="https://i.ibb.co/LhyMv0Z/luffy-icon.png">
    <meta name="theme-color" content="#080808">

    <style>
        :root { --main-red: #e50914; --vault-gold: #ffb400; --bg-black: #080808; }
        body { margin: 0; background: var(--bg-black); color: white; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; overflow-x: hidden; }
        
        /* Premium Header */
        header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.9); position: fixed; width: 100%; z-index: 100; box-sizing: border-box; border-bottom: 1px solid #222; }
        .logo { font-weight: 900; color: var(--main-red); font-size: 22px; letter-spacing: 1px; }
        .lang-btn { background: var(--vault-gold); color: black; border: none; padding: 6px 15px; border-radius: 20px; font-weight: bold; font-size: 12px; cursor: pointer; box-shadow: 0 0 10px rgba(255,180,0,0.3); }

        /* Search Bar */
        .search-container { padding: 90px 20px 10px; text-align: center; }
        input { width: 90%; padding: 14px 20px; border-radius: 12px; border: none; background: #1a1a1a; color: white; outline: none; font-size: 16px; border: 1px solid #333; box-shadow: inset 0 2px 5px rgba(0,0,0,0.5); }

        /* Movie Grid */
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 15px; }
        .movie-card { position: relative; border-radius: 10px; overflow: hidden; background: #111; aspect-ratio: 2/3; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .movie-card img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .movie-info { position: absolute; bottom: 0; padding: 8px 4px; background: linear-gradient(transparent, rgba(0,0,0,0.9)); width: 100%; font-size: 11px; text-align: center; font-weight: 500; }

        /* Ultra-Player Overlay */
        #player-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1000; display: none; }
        .close-btn { position: absolute; top: 15px; right: 20px; font-size: 35px; color: white; z-index: 1001; text-shadow: 0 0 10px black; }
        iframe { width: 100%; height: 50vh; border: none; margin-top: 60px; background: #000; }
        .controls { padding: 20px; }
        .server-btn { width: 100%; background: #222; color: white; border: 1px solid #444; padding: 12px; border-radius: 8px; margin-bottom: 10px; font-size: 14px; font-weight: bold; }
        .active-server { border-color: var(--main-red); background: rgba(229, 9, 20, 0.1); color: var(--main-red); }

        /* Brand Footer */
        footer { text-align: center; padding: 30px; color: #444; font-size: 11px; line-height: 1.6; }
    </style>
</head>
<body>

<header>
    <div class="logo">THE VAULT</div>
    <button class="lang-btn" onclick="toggleHindi()">HINDI MODE: <span id="lang-status">OFF</span></button>
</header>

<div class="search-container">
    <input type="text" id="searchInput" placeholder="Search Movies, Anime, Series..." oninput="debounceSearch()">
</div>

<div class="grid" id="movieGrid">
    </div>

<div id="player-overlay">
    <span class="close-btn" onclick="closePlayer()">&times;</span>
    <iframe id="videoPlayer" src="" allowfullscreen></iframe>
    <div class="controls">
        <p style="color:var(--vault-gold); font-size:13px; margin-bottom:15px; text-align:center;">Settings: Use ⚙️ in player for Quality & Hindi Subs</p>
        <button class="server-btn active-server" id="s1" onclick="switchServer(1)">Server 1 (Primary - All Qualities)</button>
        <button class="server-btn" id="s2" onclick="switchServer(2)">Server 2 (Backup Speed)</button>
        <button class="server-btn" style="background: #111; color: #fff; margin-top: 10px;" onclick="downloadVideo()">📥 Download Link</button>
    </div>
</div>

<footer>
    Designed for Paul Somendra<br>
    <strong>WORK SMART NOT HARD</strong>
</footer>

<script>
    const API_KEY = '8d6d91d9c9454790407d47f939e0802c';
    let currentId = '';
    let currentType = 'movie';
    let isHindiMode = false;
    let timeout = null;

    // Load Trending on Start
    window.onload = () => { fetchMovies('https://api.themoviedb.org/3/trending/all/day?api_key=' + API_KEY); };

    function toggleHindi() {
        isHindiMode = !isHindiMode;
        document.getElementById('lang-status').innerText = isHindiMode ? 'ON' : 'OFF';
        const query = document.getElementById('searchInput').value;
        if(query) debounceSearch(); else window.onload();
    }

    function debounceSearch() {
        clearTimeout(timeout);
        timeout = setTimeout(() => {
            const query = document.getElementById('searchInput').value;
            if(query.length > 2) {
                const lang = isHindiMode ? 'hi-IN' : 'en-US';
                fetchMovies(`https://api.themoviedb.org/3/search/multi?api_key=${API_KEY}&query=${query}&language=${lang}`);
            }
        }, 500);
    }

    async function fetchMovies(url) {
        try {
            const res = await fetch(url);
            const data = await res.json();
            if(data.results) displayMovies(data.results);
        } catch (e) { console.error("API Error"); }
    }

    function displayMovies(movies) {
        const grid = document.getElementById('movieGrid');
        grid.innerHTML = movies.map(m => {
            if(!m.poster_path) return '';
            const title = m.title || m.name || 'Untitled';
            return `
                <div class="movie-card" onclick="openPlayer('${m.id}', '${m.media_type || 'movie'}')">
                    <img src="https://image.tmdb.org/t/p/w500${m.poster_path}" alt="${title}">
                    <div class="movie-info">${title}</div>
                </div>
            `;
        }).join('');
    }

    function openPlayer(id, type) {
        currentId = id;
        currentType = type;
        document.getElementById('player-overlay').style.display = 'block';
        document.body.style.overflow = 'hidden';
        switchServer(1);
    }

    function switchServer(num) {
        const player = document.getElementById('videoPlayer');
        document.querySelectorAll('.server-btn').forEach(b => b.classList.remove('active-server'));
        document.getElementById('s'+num).classList.add('active-server');
        
        // Multi-source streaming
        if(num === 1) player.src = `https://vidsrc.to/embed/${currentType}/${currentId}`;
        if(num === 2) player.src = `https://embed.su/embed/${currentType}/${currentId}`;
    }

    function closePlayer() {
        document.getElementById('player-overlay').style.display = 'none';
        document.getElementById('videoPlayer').src = '';
        document.body.style.overflow = 'auto';
    }

    function downloadVideo() {
        const url = `https://vidsrc.to/embed/${currentType}/${currentId}`;
        window.open(url, '_blank');
    }
</script>
</body>
</html>
