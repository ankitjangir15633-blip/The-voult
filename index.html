<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE VAULT | PREMIUM</title>
    <style>
        body { margin: 0; background: #050505; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        header { padding: 15px; text-align: center; color: #e50914; font-size: 24px; font-weight: 900; background: #000; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 12px; padding: 20px; }
        .card { background: #111; border-radius: 8px; overflow: hidden; cursor: pointer; border: 1px solid #222; transition: 0.3s; }
        .card:hover { transform: scale(1.05); border-color: #e50914; }
        .card img { width: 100%; aspect-ratio: 2/3; display: block; }
        .card p { padding: 8px; margin: 0; font-size: 11px; text-align: center; font-weight: bold; }
        
        /* Player & Controls */
        #player { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: none; z-index: 2000; }
        .controls { position: absolute; bottom: 0; width: 100%; background: rgba(0,0,0,0.9); padding: 15px; box-sizing: border-box; display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; border-top: 1px solid #333; }
        button { padding: 8px 15px; border-radius: 5px; border: none; background: #333; color: white; cursor: pointer; font-size: 12px; }
        button.active { background: #e50914; }
        .close { position: absolute; top: 15px; right: 20px; font-size: 35px; color: #fff; cursor: pointer; z-index: 2001; background: rgba(0,0,0,0.5); border-radius: 50%; width: 45px; text-align: center; }
        iframe { width: 100%; height: calc(100% - 70px); border: none; }
        footer { text-align: center; padding: 20px; font-size: 10px; opacity: 0.4; }
    </style>
</head>
<body>

<header>THE VAULT</header>
<div class="grid" id="movieGrid"></div>
<footer>PAUL SOMENDRA | WORK SMART NOT HARD</footer>

<div id="player">
    <span class="close" onclick="stop()">×</span>
    <iframe id="f" allowfullscreen></iframe>
    <div class="controls" id="serverControls">
        <span style="width:100%; text-align:center; font-size:12px; color:#aaa;">Change Server if Audio/Language is not Hindi:</span>
        <button onclick="changeServer(1)">Server 1</button>
        <button onclick="changeServer(2)">Server 2</button>
        <button onclick="changeServer(3)">Server 3</button>
        <button onclick="changeServer(4)">Server 4</button>
    </div>
</div>

<script>
    const movies = [
        {n:"Deadpool & Wolverine", id:"533535", img:"/8cdWjvZQUmSMyU9t2S78STmSost.jpg"},
        {n:"Stranger Things", id:"66732", img:"/49WfT1UgiHkYJ0pBrv3YqJu6S36.jpg", type:"tv"},
        {n:"Spider-Man: No Way Home", id:"634649", img:"/1g0dhvRzfwvS1n16pP0U1fkpXqx.jpg"},
        {n:"The Boys", id:"76479", img:"/7Ns9vYvFI96DRv9cyZ0YvSjD69r.jpg", type:"tv"},
        {n:"Avengers: Endgame", id:"299534", img:"/or06vS3ST0PgpCgCwvKvbM0pNWG.jpg"},
        {n:"Interstellar (Sci-Fi)", id:"157336", img:"/gEU2QniE6E07Qv8vNGjuRUDQp6m.jpg"}
    ];

    let currentId = "";
    let currentType = "";

    function setup() {
        const grid = document.getElementById('movieGrid');
        movies.forEach(m => {
            const div = document.createElement('div');
            div.className = 'card';
            div.onclick = () => play(m.id, m.type || 'movie');
            div.innerHTML = `<img src="https://wsrv.nl/?url=https://image.tmdb.org/t/p/w300${m.img}"><p>${m.n}</p>`;
            grid.appendChild(div);
        });
    }

    function play(id, type) {
        currentId = id;
        currentType = type;
        document.getElementById('player').style.display = 'block';
        changeServer(1); // Default Server
    }

    function changeServer(num) {
        const f = document.getElementById('f');
        const t = currentType === 'tv' ? 'tv' : 'movie';
        
        // Alag-alag Free Servers
        const servers = {
            1: `https://vidsrc.me/embed/${t}?tmdb=${currentId}`,
            2: `https://vidsrc.to/embed/${t}/${currentId}`,
            3: `https://embed.smashystream.com/playere.php?tmdb=${currentId}`,
            4: `https://autoembed.to/movie/tmdb/${currentId}`
        };

        f.src = servers[num];
        
        // Update Button Style
        document.querySelectorAll('button').forEach((b, i) => {
            b.className = (i === num-1) ? 'active' : '';
        });
    }

    function stop() {
        document.getElementById('player').style.display = 'none';
        document.getElementById('f').src = '';
    }

    setup();
</script>
</body>
</html>
