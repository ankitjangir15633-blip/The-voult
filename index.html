<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE VAULT | NETFLIX</title>
    <style>
        body { margin: 0; background: #141414; color: white; font-family: 'Helvetica Neue', Arial, sans-serif; overflow-x: hidden; }
        header { padding: 15px 4%; background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent); position: fixed; width: 100%; z-index: 10; color: #e50914; font-size: 25px; font-weight: bold; }
        .hero { height: 60vh; background: linear-gradient(to top, #141414, transparent), url('https://wallpapercave.com/wp/wp1917154.jpg') center/50% no-repeat; display: flex; align-items: flex-end; padding: 4%; }
        .search-area { padding: 20px 4%; text-align: center; }
        input { width: 90%; padding: 15px; border-radius: 4px; border: 1px solid #333; background: #333; color: white; font-size: 16px; outline: none; }
        h2 { padding: 0 4%; margin-top: 20px; font-size: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; padding: 0 4% 40px 4%; }
        .card { cursor: pointer; transition: 0.3s; }
        .card:hover { transform: scale(1.05); }
        .card img { width: 100%; border-radius: 4px; background: #222; min-height: 180px; }
        #player { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; display: none; z-index: 100; }
        iframe { width: 100%; height: 100%; border: none; }
        .close { position: absolute; top: 20px; right: 20px; font-size: 35px; color: white; cursor: pointer; z-index: 101; background: rgba(0,0,0,0.5); border-radius: 50%; width: 45px; text-align: center; }
    </style>
</head>
<body>

<header>THE VAULT</header>
<div class="hero"><div><h1>Latest Movies & Shows</h1></div></div>

<div class="search-area">
    <input type="text" id="s" placeholder="Search for a movie or TV show..." onkeyup="search()">
</div>

<h2>Trending Now</h2>
<div class="grid" id="g"></div>

<div id="player"><span class="close" onclick="closeP()">×</span><iframe id="f" allowfullscreen></iframe></div>

<script>
    const key = "15d1a9983d3246a1d0c4ded411275e84";
    const imgBase = "https://images.weserv.nl/?url=https://image.tmdb.org/t/p/w300";

    // 1. Load Trending Movies Automatically
    async function loadTrending() {
        const res = await fetch(`https://api.themoviedb.org/3/trending/all/week?api_key=${key}`);
        const data = await res.json();
        display(data.results);
    }

    // 2. Search Function
    async function search() {
        const v = document.getElementById('s').value;
        if(v.length < 3) { if(v.length == 0) loadTrending(); return; }
        const res = await fetch(`https://api.themoviedb.org/3/search/multi?api_key=${key}&query=${v}`);
        const data = await res.json();
        display(data.results);
    }

    function display(movies) {
        const g = document.getElementById('g');
        g.innerHTML = '';
        movies.forEach(m => {
            if(!m.poster_path) return;
            const div = document.createElement('div');
            div.className = 'card';
            div.onclick = () => {
                const type = m.media_type === 'tv' ? 'tv' : 'movie';
                document.getElementById('f').src = `https://vidsrc.me/embed/${type}?tmdb=${m.id}`;
                document.getElementById('player').style.display = 'block';
            };
            div.innerHTML = `<img src="${imgBase}${m.poster_path}">`;
            g.appendChild(div);
        });
    }

    function closeP() { document.getElementById('player').style.display = 'none'; document.getElementById('f').src = ''; }
    
    // Start with trending
    loadTrending();
</script>
</body>
</html>
