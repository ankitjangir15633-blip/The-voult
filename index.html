<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE VAULT</title>
    <link rel="apple-touch-icon" href="https://i.ibb.co/LhyMv9V/luffy-icon.png">
    <meta name="theme-color" content="#080808">
    <style>
        :root { --main-red: #e50914; --vault-gold: #ffb400; --bg-black: #080808; --card-bg: #1a1a1a; }
        body { margin: 0; background: var(--bg-black); color: white; font-family: 'Segoe UI', sans-serif; overflow-x: hidden; }
        header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; position: sticky; top: 0; background: var(--bg-black); z-index: 100; }
        .logo { font-weight: 900; color: var(--main-red); font-size: 1.5rem; letter-spacing: 1px; }
        .search-container { padding: 20px; text-align: center; }
        input { width: 90%; padding: 14px; border-radius: 8px; border: 1px solid #444; background: #222; color: white; font-size: 1rem; outline: none; }
        input:focus { border-color: var(--main-red); }
        .movie-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; padding: 20px; }
        .movie-card { background: var(--card-bg); border-radius: 10px; overflow: hidden; transition: 0.3s; cursor: pointer; border: 1px solid #222; }
        .movie-card:hover { transform: scale(1.05); border-color: var(--vault-gold); }
        .movie-card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; }
        .movie-info { padding: 8px; font-size: 0.8rem; text-align: center; font-weight: bold; min-height: 40px; display: flex; align-items: center; justify-content: center; }
        #player-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: none; z-index: 2000; }
        .close-btn { position: absolute; top: 10px; right: 20px; font-size: 2.5rem; color: white; cursor: pointer; z-index: 2001; }
        iframe { width: 100%; height: 50vh; border: none; margin-top: 60px; background: #000; }
        .controls { padding: 20px; text-align: center; }
        .server-btn { background: #333; color: white; border: 1px solid #555; padding: 12px; width: 100%; margin-bottom: 10px; border-radius: 5px; font-weight: bold; cursor: pointer; }
        .server-btn.active { background: var(--main-red); border-color: var(--main-red); }
        .footer-brand { text-align: center; font-size: 0.7rem; opacity: 0.5; margin: 30px 0; line-height: 1.5; }
    </style>
</head>
<body>

<header>
    <div class="logo">THE VAULT</div>
</header>

<div class="search-container">
    <input type="text" id="searchInput" placeholder="Movie ya Show ka naam..." onkeyup="searchMovies()">
</div>

<div class="movie-grid" id="movieGrid"></div>

<div id="player-overlay">
    <span class="close-btn" onclick="closePlayer()">&times;</span>
    <iframe id="videoPlayer" src="" allowfullscreen></iframe>
    <div class="controls">
        <button class="server-btn active" id="s1" onclick="changeServer(1)">Server 1 (Best)</button>
        <button class="server-btn" id="s2" onclick="changeServer(2)">Server 2 (Fast)</button>
    </div>
</div>

<div class="footer-brand">
    Designed for Paul Somendra<br>
    <strong>WORK SMART NOT HARD</strong>
</div>

<script>
    const API_KEY = '8dd387dc74191d8e69d7a2249826046e';
    let currentId = '';
    let currentType = '';

    async function searchMovies() {
        const query = document.getElementById('searchInput').value;
        if(query.length < 2) return;
        try {
            const res = await fetch(`https://api.themoviedb.org/3/search/multi?api_key=${API_KEY}&query=${query}&language=hi-IN`);
            const data = await res.json();
            const grid = document.getElementById('movieGrid');
            grid.innerHTML = '';
            data.results.forEach(m => {
                if(!m.poster_path) return;
                const card = document.createElement('div');
                card.className = 'movie-card';
                card.onclick = () => playMovie(m.id, m.media_type);
                card.innerHTML = `<img src="https://image.tmdb.org/t/p/w500${m.poster_path}"><div class="movie-info">${m.title || m.name}</div>`;
                grid.appendChild(card);
            });
        } catch (e) { console.log("Search error"); }
    }

    function playMovie(id, type) {
        currentId = id;
        currentType = (type === 'tv') ? 'tv' : 'movie';
        document.getElementById('player-overlay').style.display = 'block';
        changeServer(1);
    }

    function changeServer(s) {
        const player = document.getElementById('videoPlayer');
        document.querySelectorAll('.server-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('s'+s).classList.add('active');
        if(s === 1) player.src = `https://vidsrc.me/embed/${currentType}?tmdb=${currentId}`;
        else player.src = `https://vidsrc.to/embed/${currentType}/${currentId}`;
    }

    function closePlayer() {
        document.getElementById('player-overlay').style.display = 'none';
        document.getElementById('videoPlayer').src = '';
    }
</script>

</body>
</html>
