<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JARVIS COMMAND | AJ</title>
    <style>
        body { margin: 0; background: #000; color: #00f2ff; font-family: 'Courier New', monospace; text-align: center; height: 100vh; display: flex; flex-direction: column; justify-content: center; }
        .arc { width: 100px; height: 100px; border: 4px solid #00f2ff; border-radius: 50%; margin: 20px auto; box-shadow: 0 0 20px #00f2ff; animation: pulse 1s infinite; cursor: pointer; }
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
        #status { font-size: 1.2rem; margin-bottom: 10px; }
    </style>
</head>
<body onclick="startJarvis()">
    <div id="status">MISTER AJ<br>TAP TO START</div>
    <div class="arc"></div>
    <div id="log" style="font-size:10px; color:#555;">> Waiting...</div>

<script>
    const GITHUB_TOKEN = "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";
    const USERNAME = "ankitjangir15633-bllp";
    const REPO = "The-Vault";

    const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.lang = 'hi-IN';

    function startJarvis() {
        recognition.start();
        document.getElementById('status').innerText = "LISTENING...";
        speak("Authorized. AJ, what is your command?");
    }

    recognition.onresult = async (event) => {
        const cmd = event.results[0][0].transcript.toLowerCase();
        document.getElementById('log').innerText = "AJ: " + cmd;
        
        if(cmd.includes("app") || cmd.includes("banao")) {
            speak("Executing action. Creating file on GitHub.");
            const fileName = "AJ_Task_" + Date.now() + ".html";
            const url = `https://api.github.com/repos/${USERNAME}/${REPO}/contents/${fileName}`;
            const res = await fetch(url, {
                method: "PUT",
                headers: { "Authorization": `Bearer ${GITHUB_TOKEN}`, "Content-Type": "application/json" },
                body: JSON.stringify({ message: "AJ Command", content: btoa("<h1>Task Complete for AJ</h1>") })
            });
            if(res.ok) speak("Task complete, AJ.");
        }
    };

    function speak(t) { window.speechSynthesis.speak(new SpeechSynthesisUtterance(t)); }
</script>
</body>
</html>
