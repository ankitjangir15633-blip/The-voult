<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE VAULT</title>
    <style>
        body { margin: 0; background: #080808; color: white; font-family: sans-serif; }
        header { padding: 15px; text-align: center; border-bottom: 1px solid #333; color: #e50914; font-size: 1.8rem; font-weight: 900; }
        .search-box { padding: 20px; text-align: center; }
        input { width: 85%; padding: 15px; border-radius: 30px; border: none; background: #222; color: white; font-size: 1rem; outline: none; border: 1px solid #444; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; padding: 15px; }
        .card { background: #111; border-radius: 12px; overflow: hidden; border: 1px solid #222; text-align: center; cursor: pointer; }
        .card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; display: block; background: #1a1a1a; }
        .card p { padding: 8px; margin: 0; font-size: 0.8rem; font-weight: bold; }
        .brand { text-align: center; font-size: 10px; opacity: 0.4; margin: 40px 0; line-height: 1.6; }
    </style>
</head>
<body>
    <header>THE VAULT</header>
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search Movie..." onkeyup="doSearch()">
    </div>
    <div class="grid" id="movieGrid"></div>
    <div class="brand">Designed for Paul Somendra<br>WORK SMART NOT HARD</div>

    <script>
        // Nayi API Key aur Proxy setup
        const API_URL = "https://api.themoviedb.org/3/search/movie?api_key=15d1a9983d3246a1d0c4ded411275e84&query=";

        async function doSearch() {
            const val = document.getElementById('searchInput').value;
            if(val.length < 3) return;
            
            try {
                const response = await fetch(API_URL + val);
                const data = await response.json();
                const grid = document.getElementById('movieGrid');
                grid.innerHTML = '';

                data.results.forEach(m => {
                    if(!m.poster_path) return;
                    const card = document.createElement('div');
                    card.className = 'card';
                    // Alternate Image Server
                    const img = `https://images.weserv.nl/?url=https://image.tmdb.org/t/p/w300${m.poster_path}`;
                    card.innerHTML = `<img src="${img}"><p>${m.title || m.name}</p>`;
                    grid.appendChild(card);
                });
            } catch (err) {
                console.log("Error loading movies");
            }
        }
    </script>
</body>
</html>
