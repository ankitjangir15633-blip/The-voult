<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE VAULT | PAUL SOMENDRA</title>
    <style>
        body { margin: 0; background: #080808; color: white; font-family: 'Segoe UI', sans-serif; }
        header { padding: 20px; text-align: center; color: #e50914; font-size: 28px; font-weight: 900; letter-spacing: 2px; }
        .search-area { text-align: center; padding: 10px; sticky; top: 0; background: #080808; z-index: 100; }
        input { width: 85%; padding: 15px; border-radius: 30px; border: 2px solid #333; background: #1a1a1a; color: white; outline: none; transition: 0.3s; }
        input:focus { border-color: #e50914; width: 90%; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 15px; padding: 20px; }
        .card { background: #111; border-radius: 10px; overflow: hidden; cursor: pointer; border: 1px solid #222; transition: 0.3s; }
        .card:hover { transform: translateY(-5px); border-color: #e50914; }
        .card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; display: block; }
        .card p { padding: 8px; margin: 0; font-size: 12px; text-align: center; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        #player { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: none; z-index: 2000; }
        .close { position: absolute; top: 20px; right: 20px; font-size: 40px; color: #fff; cursor: pointer; z-index: 2001; }
        iframe { width: 100%; height: 100%; border: none; }
        footer { text-align: center; padding: 30px; font-size: 12px; opacity: 0.5; border-top: 1px solid #222; }
    </style>
</head>
<body>

<header>THE VAULT</header>

<div class="search-area">
    <input type="text" id="s" placeholder="Search Worldwide Movies & Series..." onkeyup="search()">
</div>

<div class="grid" id="g"></div>

<footer>DESIGNED BY PAUL SOMENDRA <br> WORK SMART NOT HARD</footer>

<div id="player"><span class="close" onclick="stop()">×</span><iframe id="f" allowfullscreen></iframe></div>

<script>
    // TMDB API KEY
    const K = "15d1a9983d3246a1d0c4ded411275e84";
    
    // --- BYPASS PROXY ---
    // Hum TMDB ko direct call karne ke bajaye ek proxy server (Cors-Anywhere ya Workers) use karenge
    const API_BASE = "https://api.themoviedb.org/3";
    const IMG_BASE = "https://wsrv.nl/?url=https://image.tmdb.org/t/p/w300";

    // 1. Load Trending on Start
    async function loadInitial() {
        const url = `${API_BASE}/trending/all/day?api_key=${K}`;
        fetchData(url);
    }

    // 2. Search Function
    async function search() {
        const q = document.getElementById('s').value;
        if(q.length < 3) { if(q.length == 0) loadInitial(); return; }
        const url = `${API_BASE}/search/multi?api_key=${K}&query=${encodeURIComponent(q)}`;
        fetchData(url);
    }

    async function fetchData(url) {
        try {
            const res = await fetch(url);
            const data = await res.json();
            const g = document.getElementById('g');
            g.innerHTML = '';
            
            data.results.forEach(m => {
                if(!m.poster_path) return;
                const div = document.createElement('div');
                div.className = 'card';
                div.onclick = () => {
                    const type = m.media_type === 'tv' ? 'tv' : 'movie';
                    // Multi-Language Player
                    document.getElementById('f').src = `https://vidsrc.me/embed/${type}?tmdb=${m.id}`;
                    document.getElementById('player').style.display = 'block';
                };
                div.innerHTML = `
                    <img src="${IMG_BASE}${m.poster_path}" alt="${m.title || m.name}">
                    <p>${m.title || m.name}</p>
                `;
                g.appendChild(div);
            });
        } catch (err) {
            console.log("API Blocked. Use a VPN for best results or refresh.");
        }
    }

    function stop() { 
        document.getElementById('player').style.display = 'none'; 
        document.getElementById('f').src = ''; 
    }

    loadInitial();
</script>
</body>
</html>
