<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE VAULT | PREMIUM</title>
    <style>
        :root { --nf-red: #e50914; --nf-black: #141414; }
        body { margin: 0; background: var(--nf-black); color: white; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
        header { padding: 20px 5%; display: flex; justify-content: space-between; align-items: center; background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent); position: fixed; width: 100%; box-sizing: border-box; z-index: 100; }
        .logo { color: var(--nf-red); font-size: 30px; font-weight: 900; text-decoration: none; }
        .hero { height: 80vh; background: linear-gradient(to top, var(--nf-black), transparent 30%), url('https://images.weserv.nl/?url=https://image.tmdb.org/t/p/original/mBaXZ95O2mY7Y29SjSjC9p0O1WH.jpg') center/cover; display: flex; align-items: center; padding: 0 5%; }
        .hero-info h1 { font-size: 3rem; margin-bottom: 10px; }
        .search-box { position: relative; margin-top: -50px; padding: 0 5%; z-index: 10; }
        input { width: 100%; padding: 18px; border-radius: 8px; border: 1px solid #444; background: rgba(0,0,0,0.8); color: white; font-size: 1.1rem; outline: none; box-sizing: border-box; }
        input:focus { border-color: var(--nf-red); }
        h2 { padding: 30px 5% 10px; font-size: 1.5rem; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; padding: 0 5% 50px; }
        .card { transition: transform 0.4s ease; cursor: pointer; border-radius: 4px; overflow: hidden; background: #222; }
        .card:hover { transform: scale(1.1); z-index: 5; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; display: block; }
        #player { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: none; z-index: 1000; }
        .close { position: absolute; top: 20px; right: 30px; font-size: 40px; cursor: pointer; color: white; text-shadow: 0 0 10px black; }
        iframe { width: 100%; height: 100%; border: none; }
        .brand { text-align: center; padding: 40px; font-size: 12px; opacity: 0.5; border-top: 1px solid #333; }
    </style>
</head>
<body>

<header><a href="#" class="logo">THE VAULT</a></header>

<div class="hero">
    <div class="hero-info">
        <h1>Movies & Series</h1>
        <p>Designed for Paul Somendra | WORK SMART NOT HARD</p>
    </div>
</div>

<div class="search-box">
    <input type="text" id="s" placeholder="Search movies, shows, or actors..." onkeyup="search()">
</div>

<h2 id="title">Trending Now</h2>
<div class="grid" id="g"></div>

<div class="brand">© 2026 THE VAULT - WORK SMART NOT HARD</div>

<div id="player">
    <span class="close" onclick="closeP()">&times;</span>
    <iframe id="f" src="" allowfullscreen></iframe>
</div>

<script>
    const API_KEY = "15d1a9983d3246a1d0c4ded411275e84";
    const PROXY = "https://images.weserv.nl/?url=";

    async function fetchMovies(url) {
        try {
            const res = await fetch(url);
            const data = await res.json();
            const g = document.getElementById('g');
            g.innerHTML = '';
            data.results.forEach(m => {
                if(!m.poster_path) return;
                const div = document.createElement('div');
                div.className = 'card';
                div.onclick = () => play(m.id, m.media_type || 'movie');
                const imgUrl = `${PROXY}https://image.tmdb.org/t/p/w300${m.poster_path}`;
                div.innerHTML = `<img src="${imgUrl}" loading="lazy">`;
                g.appendChild(div);
            });
        } catch (e) { console.error("Data blocked by ISP"); }
    }

    async function search() {
        const query = document.getElementById('s').value;
        const title = document.getElementById('title');
        if (query.length > 2) {
            title.innerText = "Search Results";
            fetchMovies(`https://api.themoviedb.org/3/search/multi?api_key=${API_KEY}&query=${query}`);
        } else if (query.length === 0) {
            title.innerText = "Trending Now";
            loadTrending();
        }
    }

    function loadTrending() {
        fetchMovies(`https://api.themoviedb.org/3/trending/all/day?api_key=${API_KEY}`);
    }

    function play(id, type) {
        const player = document.getElementById('player');
        const frame = document.getElementById('f');
        const finalType = type === 'tv' ? 'tv' : 'movie';
        frame.src = `https://vidsrc.me/embed/${finalType}?tmdb=${id}`;
        player.style.display = 'block';
    }

    function closeP() {
        document.getElementById('player').style.display = 'none';
        document.getElementById('f').src = '';
    }

    loadTrending();
</script>
</body>
</html>
