<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE VAULT</title>
    <style>
        body { margin: 0; background: #080808; color: white; font-family: sans-serif; text-align: center; }
        header { padding: 20px; border-bottom: 1px solid #333; color: #e50914; font-size: 1.5rem; font-weight: bold; }
        input { width: 85%; padding: 15px; margin: 20px 0; border-radius: 8px; border: none; background: #222; color: white; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; padding: 10px; }
        .card { background: #1a1a1a; border-radius: 8px; overflow: hidden; font-size: 12px; padding-bottom: 5px; }
        .card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; background: #333; }
        .brand { font-size: 10px; opacity: 0.5; margin-top: 50px; }
    </style>
</head>
<body>
    <header>THE VAULT</header>
    <input type="text" id="q" placeholder="Movie name..." onkeyup="search()">
    <div class="grid" id="g"></div>
    <div class="brand">Designed for Paul Somendra<br>WORK SMART NOT HARD</div>

    <script>
        async function search() {
            const v = document.getElementById('q').value;
            if(v.length < 3) return;
            // Using a proxy for posters
            const res = await fetch(`https://api.themoviedb.org/3/search/movie?api_key=8dd387dc74191d8e69d7a2249826046e&query=${v}`);
            const data = await res.json();
            const g = document.getElementById('g');
            g.innerHTML = '';
            data.results.forEach(m => {
                const div = document.createElement('div');
                div.className = 'card';
                // Poster path with a different URL to try and bypass blocks
                const imgUrl = m.poster_path ? `https://images.weserv.nl/?url=https://image.tmdb.org/t/p/w200${m.poster_path}` : 'https://via.placeholder.com/200x300?text=No+Poster';
                div.innerHTML = `<img src="${imgUrl}"><p>${m.title}</p>`;
                g.appendChild(div);
            });
        }
    </script>
</body>
</html>
