<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE VAULT | PAUL SOMENDRA</title>
    <style>
        body { margin: 0; background: #000; color: white; font-family: sans-serif; }
        header { padding: 15px; text-align: center; color: #e50914; font-size: 1.5rem; font-weight: 900; }
        .search-box { padding: 10px; text-align: center; sticky; top: 0; background: #000; z-index: 10; }
        input { width: 85%; padding: 12px; border-radius: 5px; border: 1px solid #e50914; background: #222; color: white; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 10px; padding: 15px; }
        .card { background: #111; border-radius: 5px; overflow: hidden; cursor: pointer; border: 1px solid #222; }
        .card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; }
        #player { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: none; z-index: 1000; }
        .close { position: absolute; top: 15px; right: 15px; font-size: 35px; color: #fff; z-index: 1001; font-weight: bold; }
        iframe { width: 100%; height: 100%; border: none; }
        footer { text-align: center; padding: 20px; font-size: 10px; opacity: 0.5; }
    </style>
</head>
<body>

<header>THE VAULT</header>
<div class="search-box">
    <input type="text" id="s" placeholder="Search Worldwide Movies..." onkeyup="search()">
</div>

<div class="grid" id="g"></div>

<footer>PAUL SOMENDRA | WORK SMART NOT HARD</footer>

<div id="player"><span class="close" onclick="stop()">×</span><iframe id="f" allowfullscreen></iframe></div>

<script>
    const key = "15d1a9983d3246a1d0c4ded411275e84";
    // Naya Proxy Server for Images
    const proxy = "https://wsrv.nl/?url=";

    async function search() {
        const v = document.getElementById('s').value;
        if(v.length < 3) return;
        const res = await fetch(`https://api.themoviedb.org/3/search/multi?api_key=${key}&query=${v}`);
        const data = await res.json();
        const g = document.getElementById('g');
        g.innerHTML = '';
        data.results.forEach(m => {
            if(!m.poster_path) return;
            const div = document.createElement('div');
            div.className = 'card';
            div.onclick = () => {
                const type = m.media_type === 'tv' ? 'tv' : 'movie';
                document.getElementById('f').src = `https://vidsrc.me/embed/${type}?tmdb=${m.id}`;
                document.getElementById('player').style.display = 'block';
            };
            // Double proxy for India
            div.innerHTML = `<img src="${proxy}https://image.tmdb.org/t/p/w200${m.poster_path}"><p style="font-size:10px; padding:5px; margin:0;">${m.title || m.name}</p>`;
            g.appendChild(div);
        });
    }

    function stop() { document.getElementById('player').style.display = 'none'; document.getElementById('f').src = ''; }
</script>
</body>
</html>
