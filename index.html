<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE VAULT | HINDI PREMIUM</title>
    <style>
        :root { --red: #e50914; --black: #050505; }
        body { margin: 0; background: var(--black); color: white; font-family: 'Segoe UI', Arial, sans-serif; }
        header { padding: 15px 5%; background: rgba(0,0,0,0.9); position: sticky; top: 0; z-index: 100; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--red); }
        .logo { color: var(--red); font-size: 26px; font-weight: 900; }
        .search-area { padding: 20px 5%; text-align: center; }
        input { width: 100%; max-width: 600px; padding: 15px 25px; border-radius: 30px; border: none; background: #222; color: white; font-size: 16px; outline: none; border: 1px solid #444; }
        input:focus { border-color: var(--red); box-shadow: 0 0 10px var(--red); }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; padding: 20px 5%; }
        .card { background: #111; border-radius: 10px; overflow: hidden; cursor: pointer; transition: 0.4s; position: relative; }
        .card:hover { transform: scale(1.07); box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; display: block; }
        .card p { padding: 10px; margin: 0; font-size: 12px; text-align: center; font-weight: bold; }
        .lang-tag { position: absolute; top: 5px; right: 5px; background: var(--red); font-size: 10px; padding: 2px 6px; border-radius: 3px; }
        #player-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: none; z-index: 5000; }
        .close-btn { position: absolute; top: 15px; right: 20px; font-size: 40px; color: white; cursor: pointer; z-index: 5001; }
        iframe { width: 100%; height: 100%; border: none; }
        footer { text-align: center; padding: 40px; opacity: 0.5; font-size: 12px; border-top: 1px solid #222; }
    </style>
</head>
<body>

<header><div class="logo">THE VAULT HINDI</div></header>

<div class="search-area">
    <input type="text" id="s" placeholder="Search Hindi Movies, Dubbed Series, Bollywood..." onkeyup="search()">
</div>

<div class="grid" id="g"></div>

<footer>DESIGNED BY PAUL SOMENDRA | WORK SMART NOT HARD</footer>

<div id="player-overlay">
    <span class="close-btn" onclick="closePlayer()">×</span>
    <iframe id="video-frame" allowfullscreen></iframe>
</div>

<script>
    const API_KEY = "15d1a9983d3246a1d0c4ded411275e84";
    const IMG_PROXY = "https://wsrv.nl/?url=https://image.tmdb.org/t/p/w300";

    // Start with Hindi Trending
    async function init() {
        // Bollywood & Hindi Dubbed Trending (Using Region IN)
        const url = `https://api.themoviedb.org/3/discover/movie?api_key=${API_KEY}&with_original_language=hi&sort_by=popularity.desc`;
        loadData(url);
    }

    async function search() {
        const query = document.getElementById('s').value;
        if(query.length < 3) { if(query.length == 0) init(); return; }
        
        // Search worldwide but query optimization for Hindi
        const url = `https://api.themoviedb.org/3/search/multi?api_key=${API_KEY}&query=${encodeURIComponent(query)}&include_adult=false`;
        loadData(url);
    }

    async function loadData(url) {
        try {
            const res = await fetch(url);
            const data = await res.json();
            const g = document.getElementById('g');
            g.innerHTML = '';

            data.results.forEach(m => {
                if(!m.poster_path) return;
                
                const div = document.createElement('div');
                div.className = 'card';
                // Isme "tv" aur "movie" dono ka support hai episodes ke liye
                const type = m.media_type || (m.first_air_date ? 'tv' : 'movie');
                
                div.onclick = () => play(m.id, type);
                
                div.innerHTML = `
                    <div class="lang-tag">HINDI</div>
                    <img src="${IMG_PROXY}${m.poster_path}">
                    <p>${m.title || m.name}</p>
                `;
                g.appendChild(div);
            });
        } catch (e) {
            console.log("Error loading content. API might be blocked.");
        }
    }

    function play(id, type) {
        const overlay = document.getElementById('player-overlay');
        const frame = document.getElementById('video-frame');
        
        // Multi-language servers jo episodes aur seasons control khud dete hain
        // Isme click karte hi andar Seasons ka menu aa jayega
        frame.src = `https://vidsrc.me/embed/${type}?tmdb=${id}`;
        
        overlay.style.display = 'block';
        document.body.style.overflow = 'hidden'; // Stop scroll
    }

    function closePlayer() {
        document.getElementById('player-overlay').style.display = 'none';
        document.getElementById('video-frame').src = '';
        document.body.style.overflow = 'auto';
    }

    init();
</script>
</body>
</html>
