<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AJ VAULT — Stream Everything</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --neon-blue: #00d4ff;
    --neon-gold: #ffd700;
    --neon-red: #ff2d55;
    --luffy-red: #e8112d;
    --dark-bg: #080810;
    --card-bg: #0e0e1a;
    --surface: #14141f;
    --border: rgba(0,212,255,0.15);
    --text-primary: #f0f0ff;
    --text-muted: #7878a0;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Rajdhani', sans-serif;
    background-color: var(--dark-bg);
    color: var(--text-primary);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Straw Hat texture overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(ellipse 80% 40% at 20% 0%, rgba(232,17,45,0.07) 0%, transparent 60%),
      radial-gradient(ellipse 60% 30% at 80% 100%, rgba(0,212,255,0.06) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  /* Scan line effect */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.03) 2px,
      rgba(0,0,0,0.03) 4px
    );
    pointer-events: none;
    z-index: 1;
  }

  #app { position: relative; z-index: 2; }

  /* ─── HEADER ─── */
  .site-header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(8,8,16,0.92);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 0 1.5rem;
  }

  .header-inner {
    max-width: 1400px;
    margin: 0 auto;
    height: 64px;
    display: flex;
    align-items: center;
    gap: 1.5rem;
  }

  .logo {
    font-family: 'Bebas Neue', cursive;
    font-size: 2rem;
    letter-spacing: 0.1em;
    color: var(--neon-blue);
    text-shadow: 0 0 20px rgba(0,212,255,0.5);
    flex-shrink: 0;
    cursor: pointer;
  }

  .logo span {
    color: var(--luffy-red);
    text-shadow: 0 0 20px rgba(232,17,45,0.5);
  }

  /* Hat icon */
  .hat-icon {
    display: inline-block;
    width: 28px;
    height: 18px;
    position: relative;
    margin-right: 4px;
    vertical-align: middle;
    margin-bottom: 3px;
  }

  .nav-tabs {
    display: flex;
    gap: 0.25rem;
    flex: 1;
  }

  .nav-tab {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 0.95rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 0.4rem 1rem;
    border-radius: 4px;
    cursor: pointer;
    color: var(--text-muted);
    border: 1px solid transparent;
    background: none;
    transition: all 0.2s;
  }

  .nav-tab:hover {
    color: var(--neon-blue);
    border-color: var(--border);
    background: rgba(0,212,255,0.05);
  }

  .nav-tab.active {
    color: var(--neon-blue);
    border-color: rgba(0,212,255,0.4);
    background: rgba(0,212,255,0.08);
    text-shadow: 0 0 10px rgba(0,212,255,0.4);
  }

  /* ─── SEARCH & FILTERS ─── */
  .search-bar-wrap {
    position: relative;
    flex: 1;
    max-width: 340px;
  }

  .search-bar {
    width: 100%;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0.45rem 1rem 0.45rem 2.5rem;
    color: var(--text-primary);
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.95rem;
    outline: none;
    transition: border-color 0.2s;
  }

  .search-bar:focus {
    border-color: rgba(0,212,255,0.5);
    background: rgba(0,212,255,0.04);
  }

  .search-bar::placeholder { color: var(--text-muted); }

  .search-icon {
    position: absolute;
    left: 0.75rem;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    font-size: 14px;
  }

  /* ─── HERO BANNER ─── */
  .hero {
    position: relative;
    height: 420px;
    overflow: hidden;
    background: linear-gradient(135deg, #0a0010 0%, #05050f 50%, #0a0005 100%);
  }

  .hero-bg {
    position: absolute;
    inset: 0;
    background:
      linear-gradient(135deg, rgba(232,17,45,0.12) 0%, transparent 50%),
      linear-gradient(225deg, rgba(0,212,255,0.1) 0%, transparent 50%);
  }

  /* Gear pattern */
  .hero-gear {
    position: absolute;
    right: -60px;
    top: -60px;
    width: 400px;
    height: 400px;
    opacity: 0.04;
    animation: spin-slow 40s linear infinite;
  }

  @keyframes spin-slow { to { transform: rotate(360deg); } }

  .hero-content {
    position: relative;
    z-index: 2;
    padding: 3rem 2rem;
    max-width: 1400px;
    margin: 0 auto;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  .hero-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(232,17,45,0.15);
    border: 1px solid rgba(232,17,45,0.3);
    color: #ff6080;
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 0.3rem 0.8rem;
    border-radius: 3px;
    margin-bottom: 1rem;
    width: fit-content;
  }

  .hero-title {
    font-family: 'Bebas Neue', cursive;
    font-size: clamp(2.5rem, 6vw, 4.5rem);
    line-height: 1;
    color: var(--text-primary);
    text-shadow: 0 0 40px rgba(0,212,255,0.2);
    margin-bottom: 0.75rem;
  }

  .hero-title .highlight {
    color: var(--neon-blue);
    text-shadow: 0 0 30px rgba(0,212,255,0.6);
  }

  .hero-meta {
    display: flex;
    gap: 1.5rem;
    margin-bottom: 1.5rem;
    align-items: center;
    flex-wrap: wrap;
  }

  .hero-meta span {
    font-size: 0.9rem;
    color: var(--text-muted);
    font-weight: 600;
    letter-spacing: 0.05em;
  }

  .hero-meta .rating {
    color: var(--neon-gold);
    font-weight: 700;
  }

  .hero-actions {
    display: flex;
    gap: 0.75rem;
    flex-wrap: wrap;
  }

  .btn-primary {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 0.95rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 0.6rem 1.5rem;
    background: var(--neon-blue);
    color: #000;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-primary:hover {
    background: #fff;
    box-shadow: 0 0 20px rgba(0,212,255,0.4);
    transform: translateY(-1px);
  }

  .btn-secondary {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 0.95rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 0.6rem 1.5rem;
    background: rgba(255,255,255,0.07);
    color: var(--text-primary);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-secondary:hover {
    background: rgba(255,255,255,0.12);
    border-color: rgba(255,255,255,0.3);
  }

  /* ─── FILTER BAR ─── */
  .filter-bar {
    padding: 1rem 1.5rem;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }

  .filter-inner {
    max-width: 1400px;
    margin: 0 auto;
    display: flex;
    gap: 0.75rem;
    align-items: center;
    flex-wrap: wrap;
  }

  .filter-label {
    font-size: 0.8rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted);
    flex-shrink: 0;
  }

  .filter-chip {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 600;
    font-size: 0.85rem;
    letter-spacing: 0.05em;
    padding: 0.3rem 0.8rem;
    border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.1);
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.2s;
  }

  .filter-chip:hover {
    color: var(--text-primary);
    border-color: rgba(255,255,255,0.25);
  }

  .filter-chip.active {
    background: rgba(0,212,255,0.12);
    border-color: rgba(0,212,255,0.4);
    color: var(--neon-blue);
  }

  .filter-sep {
    width: 1px;
    height: 20px;
    background: var(--border);
    flex-shrink: 0;
  }

  /* ─── MAIN CONTENT ─── */
  .main-content {
    max-width: 1400px;
    margin: 0 auto;
    padding: 2rem 1.5rem;
  }

  .section-header {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    margin-bottom: 1.25rem;
  }

  .section-title {
    font-family: 'Bebas Neue', cursive;
    font-size: 1.5rem;
    letter-spacing: 0.08em;
    color: var(--text-primary);
  }

  .section-line {
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, var(--border), transparent);
  }

  .section-count {
    font-size: 0.8rem;
    color: var(--text-muted);
    font-weight: 600;
  }

  /* ─── CARD GRID ─── */
  .card-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 1rem;
    margin-bottom: 3rem;
  }

  .media-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    cursor: pointer;
    transition: all 0.25s;
    position: relative;
    animation: fadeUp 0.4s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .media-card:hover {
    border-color: rgba(0,212,255,0.45);
    transform: translateY(-4px) scale(1.02);
    box-shadow: 0 12px 40px rgba(0,0,0,0.5), 0 0 20px rgba(0,212,255,0.1);
    z-index: 10;
  }

  .card-thumb {
    aspect-ratio: 2/3;
    position: relative;
    overflow: hidden;
  }

  .card-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.35s;
  }

  .media-card:hover .card-img { transform: scale(1.07); }

  .card-thumb-placeholder {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Bebas Neue', cursive;
    font-size: 1.1rem;
    letter-spacing: 0.05em;
    text-align: center;
    padding: 1rem;
    line-height: 1.3;
  }

  .card-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(8,8,16,0.95) 0%, rgba(8,8,16,0.2) 60%, transparent 100%);
    opacity: 0;
    transition: opacity 0.25s;
    display: flex;
    align-items: flex-end;
    padding: 0.75rem;
  }

  .media-card:hover .card-overlay { opacity: 1; }

  .card-play-btn {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    background: var(--neon-blue);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    box-shadow: 0 0 15px rgba(0,212,255,0.5);
  }

  .card-play-btn svg { width: 16px; height: 16px; margin-left: 2px; }

  .card-top-badges {
    position: absolute;
    top: 0.5rem;
    left: 0.5rem;
    right: 0.5rem;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
  }

  .badge {
    font-family: 'Space Mono', monospace;
    font-size: 0.6rem;
    font-weight: 700;
    padding: 0.2rem 0.45rem;
    border-radius: 3px;
    letter-spacing: 0.05em;
  }

  .badge-quality {
    background: rgba(0,212,255,0.9);
    color: #000;
  }

  .badge-type {
    background: rgba(232,17,45,0.85);
    color: #fff;
  }

  .badge-new {
    background: var(--neon-gold);
    color: #000;
  }

  .card-info {
    padding: 0.65rem 0.75rem;
  }

  .card-title {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 0.95rem;
    color: var(--text-primary);
    margin-bottom: 0.2rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .card-meta-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 0.75rem;
    color: var(--text-muted);
    font-weight: 600;
  }

  .card-rating {
    color: var(--neon-gold);
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
  }

  /* ─── MODAL ─── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 1000;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1rem;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s;
  }

  .modal-overlay.open {
    opacity: 1;
    pointer-events: all;
  }

  .modal {
    background: var(--card-bg);
    border: 1px solid rgba(0,212,255,0.2);
    border-radius: 12px;
    width: 100%;
    max-width: 680px;
    max-height: 90vh;
    overflow-y: auto;
    position: relative;
    transform: scale(0.95) translateY(20px);
    transition: transform 0.25s;
  }

  .modal-overlay.open .modal {
    transform: scale(1) translateY(0);
  }

  .modal-banner {
    height: 220px;
    position: relative;
    overflow: hidden;
    border-radius: 12px 12px 0 0;
  }

  .modal-banner-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .modal-banner-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, var(--card-bg) 0%, rgba(14,14,26,0.3) 100%);
  }

  .modal-close {
    position: absolute;
    top: 1rem;
    right: 1rem;
    width: 32px;
    height: 32px;
    background: rgba(0,0,0,0.6);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 50%;
    color: #fff;
    font-size: 1rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10;
    transition: background 0.2s;
  }

  .modal-close:hover { background: var(--luffy-red); }

  .modal-body {
    padding: 1.5rem;
  }

  .modal-title {
    font-family: 'Bebas Neue', cursive;
    font-size: 2rem;
    letter-spacing: 0.05em;
    margin-bottom: 0.5rem;
  }

  .modal-tags {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
    margin-bottom: 1rem;
  }

  .modal-tag {
    font-size: 0.75rem;
    font-weight: 700;
    padding: 0.2rem 0.6rem;
    border-radius: 3px;
    border: 1px solid rgba(255,255,255,0.15);
    color: var(--text-muted);
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  .modal-desc {
    font-size: 0.95rem;
    color: #a0a0c0;
    line-height: 1.65;
    margin-bottom: 1.5rem;
  }

  /* ─── PLAYER CONTROLS SECTION ─── */
  .player-controls {
    background: rgba(0,0,0,0.3);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 1.25rem;
    margin-bottom: 1.25rem;
  }

  .controls-title {
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 1rem;
  }

  .controls-row {
    display: flex;
    gap: 1.25rem;
    flex-wrap: wrap;
    align-items: center;
  }

  .control-group {
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
    flex: 1;
    min-width: 140px;
  }

  .control-group label {
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  .control-select {
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    border-radius: 5px;
    color: var(--text-primary);
    font-family: 'Rajdhani', sans-serif;
    font-weight: 600;
    font-size: 0.9rem;
    padding: 0.45rem 0.75rem;
    outline: none;
    cursor: pointer;
    width: 100%;
    transition: border-color 0.2s;
  }

  .control-select:focus {
    border-color: rgba(0,212,255,0.4);
  }

  .control-select option {
    background: #1a1a2e;
  }

  /* ─── LANGUAGE SWITCHER ─── */
  .lang-switcher {
    display: flex;
    gap: 0.5rem;
    flex: 1;
    min-width: 200px;
  }

  .lang-btn {
    flex: 1;
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 0.85rem;
    letter-spacing: 0.06em;
    padding: 0.45rem;
    border-radius: 5px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
  }

  .lang-btn.active {
    background: rgba(255,215,0,0.1);
    border-color: rgba(255,215,0,0.4);
    color: var(--neon-gold);
  }

  .lang-btn:hover:not(.active) {
    color: var(--text-primary);
    border-color: rgba(255,255,255,0.2);
  }

  .watch-btn {
    width: 100%;
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 1rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 0.8rem;
    border-radius: 6px;
    border: none;
    background: linear-gradient(135deg, var(--luffy-red), #c0001e);
    color: #fff;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 4px 20px rgba(232,17,45,0.3);
  }

  .watch-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(232,17,45,0.4);
  }

  /* ─── EMPTY STATE ─── */
  .empty-state {
    text-align: center;
    padding: 4rem 1rem;
    color: var(--text-muted);
  }

  .empty-state .icon {
    font-size: 3rem;
    margin-bottom: 1rem;
    opacity: 0.4;
  }

  .empty-title {
    font-family: 'Bebas Neue', cursive;
    font-size: 1.5rem;
    letter-spacing: 0.1em;
    margin-bottom: 0.5rem;
    color: var(--text-primary);
    opacity: 0.5;
  }

  /* ─── TOAST ─── */
  .toast {
    position: fixed;
    bottom: 2rem;
    right: 2rem;
    background: var(--surface);
    border: 1px solid rgba(0,212,255,0.3);
    border-radius: 8px;
    padding: 0.85rem 1.25rem;
    font-weight: 600;
    font-size: 0.9rem;
    color: var(--neon-blue);
    z-index: 2000;
    transform: translateY(100px);
    opacity: 0;
    transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    max-width: 300px;
  }

  .toast.show {
    transform: translateY(0);
    opacity: 1;
  }

  /* ─── FOOTER ─── */
  footer {
    border-top: 1px solid var(--border);
    padding: 2.5rem 1.5rem;
    margin-top: 2rem;
  }

  .footer-inner {
    max-width: 1400px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1rem;
    text-align: center;
  }

  .footer-logo {
    font-family: 'Bebas Neue', cursive;
    font-size: 1.5rem;
    letter-spacing: 0.12em;
    color: var(--neon-blue);
    text-shadow: 0 0 15px rgba(0,212,255,0.3);
  }

  .footer-divider {
    width: 60px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--neon-blue), transparent);
  }

  .footer-signature {
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
    color: var(--text-muted);
    letter-spacing: 0.05em;
  }

  .footer-signature .name {
    color: var(--neon-gold);
    font-weight: 700;
  }

  .footer-motto {
    font-family: 'Bebas Neue', cursive;
    font-size: 1.1rem;
    letter-spacing: 0.2em;
    color: var(--luffy-red);
    text-shadow: 0 0 10px rgba(232,17,45,0.3);
  }

  .footer-links {
    display: flex;
    gap: 1.5rem;
    font-size: 0.8rem;
    color: var(--text-muted);
    font-weight: 600;
  }

<script>
/* ═══════════════════════════════════════════

const CATALOG = [

  {id:17, title:"Arcane S2", type:"webseries", genres:["action","drama","scifi"], year:2024, rating:9.6, quality:"4K", langs:["Hindi","Original"], isNew:false,
   desc:"Piltover and the Undercity fracture further. Vi and Jinx face impossible choices while technology and magic spiral toward war.",
   color:"#000510"},
  {id:18, title:"Squid Game S3", type:"webseries", genres:["thriller","drama"], year:2025, rating:8.7, quality:"4K", langs:["Hindi","Original"], isNew:true,
   desc:"Gi-hun infiltrates the Games from within, but the new host has rebuilt them with rules that even the players cannot predict.",
   color:"#080010"},
];

/* ═══════════════════════════════════════════
   STATE
═══════════════════════════════════════════ */
let activeCategory = 'all';
let activeGenre = 'all';
let activeLangFilter = 'all';
let searchQuery = '';
let currentModal = null;
let currentLang = 'Hindi';

/* ═══════════════════════════════════════════
   FILTER LOGIC
═══════════════════════════════════════════ */
function getFiltered() {
  return CATALOG.filter(item => {
    const catMatch = activeCategory === 'all' || item.type === activeCategory;
    const genreMatch = activeGenre === 'all' || item.genres.includes(activeGenre);
    const langMatch = activeLangFilter === 'all' || item.langs.map(l=>l.toLowerCase()).includes(activeLangFilter);
    const searchMatch = searchQuery === '' ||
      item.title.toLowerCase().includes(searchQuery.toLowerCase()) ||
      item.genres.some(g => g.toLowerCase().includes(searchQuery.toLowerCase()));
    return catMatch && genreMatch && langMatch && searchMatch;
  });
}

function setCategory(cat) {
  activeCategory = cat;
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.toggle('active', t.dataset.cat === cat));
  document.querySelectorAll('.mobile-nav-item').forEach(t => t.classList.toggle('active', t.dataset.cat === cat));
  renderContent();
}

function setGenre(genre) {
  activeGenre = activeGenre === genre ? 'all' : genre;
  document.querySelectorAll('.filter-chip[data-genre]').forEach(c => c.classList.toggle('active', c.dataset.genre === activeGenre));
  renderContent();
}

function setLangFilter(lang) {
  activeLangFilter = activeLangFilter === lang ? 'all' : lang;
  document.querySelectorAll('.filter-chip[data-lang]').forEach(c => c.classList.toggle('active', c.dataset.lang === activeLangFilter));
  renderContent();
}

function handleSearch(val) {
  searchQuery = val.trim();
  renderContent();
}

/* ═══════════════════════════════════════════
   RENDER
═══════════════════════════════════════════ */
const TYPE_LABEL = {movies:'MOVIE', anime:'ANIME', webseries:'SERIES'};
const TYPE_COLOR = {movies:'#3a8fff', anime:'#e8112d', webseries:'#a855f7'};

function buildCard(item, idx) {
  const delay = (idx % 20) * 0.04;
  const colors = [
    ['#1a0530','#3a0080'],['#001020','#003060'],['#0d0005','#400020'],
    ['#001a00','#004400'],['#1a1000','#3a2000'],['#0a0010','#200040']
  ];
  const [bg1, bg2] = colors[item.id % colors.length];
  return `
  <div class="media-card" onclick="openModal(CATALOG.find(c=>c.id===${item.id}))" style="animation-delay:${delay}s">
    <div class="card-thumb">
      <div class="card-thumb-placeholder" style="background:linear-gradient(135deg, ${bg1}, ${bg2})">
        <span>${item.title}</span>
      </div>
      <div class="card-top-badges">
        <span class="badge badge-quality">${item.quality}</span>
        <span class="badge badge-type" style="background:${TYPE_COLOR[item.type]}22;color:${TYPE_COLOR[item.type]};border:1px solid ${TYPE_COLOR[item.type]}44">${TYPE_LABEL[item.type]}</span>
      </div>
      <div class="card-overlay">
        <div class="card-play-btn">
          <svg viewBox="0 0 24 24" fill="#000"><polygon points="5,3 19,12 5,21"/></svg>
        </div>
      </div>
    </div>
    <div class="card-info">
      <div class="card-title">${item.title}</div>
      <div class="card-meta-row">
        <span>${item.year}</span>
        <span class="card-rating">★ ${item.rating}</span>
      </div>
    </div>
  </div>`;
}

function renderSection(title, items) {
  if (items.length === 0) return '';
  const cards = items.map((item, i) => buildCard(item, i)).join('');
  return `
  <div class="section-header">
    <h2 class="section-title">${title}</h2>
    <div class="section-line"></div>
    <span class="section-count">${items.length} titles</span>
  </div>
  <div class="card-grid">${cards}</div>`;
}

function renderContent() {
  const filtered = getFiltered();
  const main = document.getElementById('mainContent');

  if (filtered.length === 0) {
    main.innerHTML = `<div class="empty-state">
      <div class="icon">🔍</div>
      <div class="empty-title">No Results Found</div>
      <p style="font-size:0.9rem">Try different filters or search terms</p>
    </div>`;
    return;
  }

  let html = '';

  if (activeCategory === 'all' && searchQuery === '') {
    const trending = filtered.filter(i => i.isNew).slice(0, 6);
    const anime    = filtered.filter(i => i.type === 'anime');
    const movies   = filtered.filter(i => i.type === 'movies');
    const series   = filtered.filter(i => i.type === 'webseries');
    if (trending.length) html += renderSection('🔥 Trending Now', trending);
    if (anime.length)    html += renderSection('⚔ Anime', anime);
    if (movies.length)   html += renderSection('🎬 Movies', movies);
    if (series.length)   html += renderSection('📺 Web Series', series);
  } else {
    const label = activeCategory !== 'all'
      ? TYPE_LABEL[activeCategory] + 'S'
      : searchQuery ? `Search: "${searchQuery}"` : 'Results';
    html += renderSection(label, filtered);
  }

  main.innerHTML = html;
}

/* ═══════════════════════════════════════════
   MODAL
═══════════════════════════════════════════ */
function openModal(item) {
  if (!item) return;
  currentModal = item;

  document.getElementById('modalTitle').textContent = item.title;
  document.getElementById('modalDesc').textContent = item.desc;
document.querySelector('.watch-btn').onclick = () => window.open('https://vidsrc.to/embed/' + item.type + '/' + item.title.replace(/\s+/g, '-').toLowerCase());

  const tags = [
    `<span class="modal-tag">${item.year}</span>`,
    `<span class="modal-tag">${item.quality}</span>`,
    ...item.genres.map(g => `<span class="modal-tag">${g}</span>`),
    `<span class="modal-tag" style="color:var(--neon-gold);border-color:rgba(255,215,0,0.3)">★ ${item.rating}</span>`,
    `<span class="modal-tag" style="color:${TYPE_COLOR[item.type]};border-color:${TYPE_COLOR[item.type]}44">${TYPE_LABEL[item.type]}</span>`,
  ].join('');
  document.getElementById('modalTags').innerHTML = tags;

  const colors = [['#1a0530','#3a0080'],['#001020','#003060'],['#0d0005','#400020'],
    ['#001a00','#004400'],['#1a1000','#3a2000'],['#0a0010','#200040']];
  const [bg1, bg2] = colors[item.id % colors.length];
  document.getElementById('modalBanner').style.background = `linear-gradient(135deg, ${bg1}, ${bg2})`;

  // Reset controls
  currentLang = 'Hindi';
  document.getElementById('langHindi').classList.add('active');
  document.getElementById('langOriginal').classList.remove('active');
  document.getElementById('qualitySelect').value = item.quality === '4K' ? '4K' : item.quality === '1080p' ? '1080p' : '720p';

  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

function closeModalOnBg(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
}

function switchLang(lang) {
  currentLang = lang;
  document.getElementById('langHindi').classList.toggle('active', lang === 'Hindi');
  document.getElementById('langOriginal').classList.toggle('active', lang === 'Original');
  showToast(`Audio: ${lang === 'Hindi' ? '🇮🇳 Hindi Dub' : '🌐 Original Audio'}`);
}

function startWatch() {
  const quality = document.getElementById('qualitySelect').value;
  showToast(`Streaming in ${quality} · ${currentLang} Audio`);
  setTimeout(closeModal, 1200);
}

/* ═══════════════════════════════════════════
   TOAST
═══════════════════════════════════════════ */
let toastTimer = null;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2800);
}

/* ═══════════════════════════════════════════
   KEYBOARD
═══════════════════════════════════════════ */
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
  if (e.key === '/' && document.activeElement.id !== 'searchInput') {
    e.preventDefault();
    document.getElementById('searchInput').focus();
  }
});

/* ═══════════════════════════════════════════
   INIT
═══════════════════════════════════════════ */
renderContent();

/* Straw hat pulse animation */
const style = document.createElement('style');
style.textContent = `@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(1.4)} }`;
document.head.appendChild(style);
</script>
</body>
</html>
