<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>JARVIS V4 | PROTECTED</title>
    <style>
        body { background: #050505; color: #00f2ff; font-family: 'Courier New', monospace; text-align: center; padding-top: 50px; }
        .arc { width: 150px; height: 150px; border: 4px solid #00f2ff; border-radius: 50%; margin: auto; box-shadow: 0 0 25px #00f2ff; cursor: pointer; }
        input { background: #111; border: 1px solid #00f2ff; color: #fff; padding: 10px; margin-top: 20px; width: 80%; border-radius: 5px; }
        button { background: #00f2ff; border: none; padding: 10px 20px; margin-top: 10px; cursor: pointer; font-weight: bold; }
        #status { margin-top: 20px; font-size: 1.2rem; text-transform: uppercase; }
    </style>
</head>
<body>
    <div id="setup" style="display:none;">
        <h3>MISTER AJ, ENTER ACCESS KEY</h3>
        <input type="password" id="tokenInput" placeholder="ghp_xxxxxxxxxxxx">
        <br><button onclick="saveToken()">INITIALIZE SYSTEM</button>
    </div>

    <div id="mainUI">
        <div class="arc" onclick="startJarvis()"></div>
        <div id="status">SYSTEM STANDBY</div>
        <p id="log" style="font-size:12px; color:#444; margin-top:20px;">> Awaiting AJ's Voice...</p>
    </div>

<script>
    let GITHUB_TOKEN = localStorage.getItem('aj_token');

    if (!GITHUB_TOKEN) {
        document.getElementById('setup').style.display = 'block';
        document.getElementById('mainUI').style.display = 'none';
    }

    function saveToken() {
        const val = document.getElementById('tokenInput').value;
        if(val.startsWith('ghp_')) {
            localStorage.setItem('aj_token', val);
            location.reload();
        } else { alert("Invalid Token Format, AJ."); }
    }

    const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    rec.lang = 'hi-IN';

    function speak(t) {
        const m = new SpeechSynthesisUtterance(t);
        m.pitch = 0.6; m.rate = 0.9;
        window.speechSynthesis.speak(m);
    }

    function startJarvis() {
        rec.start();
        document.getElementById('status').innerText = "LISTENING...";
        speak("Authorized. Mister AJ, systems are online.");
    }

    rec.onresult = async (e) => {
        const cmd = e.results[0][0].transcript.toLowerCase();
        document.getElementById('log').innerText = "AJ: " + cmd;

        if(cmd.includes("app") || cmd.includes("banao")) {
            speak("Initiating build. Accessing GitHub Vault.");
            
            const res = await fetch(`https://api.github.com/repos/ankitjangir15633-blip/The-voult/contents/Build_${Date.now()}.html`, {
                method: "PUT",
                headers: { "Authorization": `Bearer ${GITHUB_TOKEN}`, "Content-Type": "application/json" },
                body: JSON.stringify({ message: "AJ CMD", content: btoa("<h1>Build Success</h1>") })
            });

            if(res.ok) { speak("Task finished, AJ. Check your repository."); }
            else { 
                speak("Access Denied. AJ, your token has expired.");
                localStorage.removeItem('aj_token');
                location.reload();
            }
        }
    }
</script>
</body>
</html>
